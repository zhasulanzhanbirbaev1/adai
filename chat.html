<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат с ИИ-помощником</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #agent-avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  #agent-info { flex: 1; min-width: 0; }
  #agent-name { font-weight: 600; font-size: 15px; }
  #agent-status { font-size: 12px; color: #22c55e; margin-top: 1px; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.assistant .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .msg.user .msg-avatar { background: #334155; }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.assistant .msg-bubble {
    background: #1e293b;
    border: 1px solid #334155;
    border-bottom-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: #6366f1;
    border-bottom-right-radius: 4px;
  }
  .typing-indicator {
    display: flex; gap: 4px;
    align-items: center;
    padding: 10px 14px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    background: #64748b;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }
  #input-area {
    background: #1e293b;
    border-top: 1px solid #334155;
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 10px 14px;
    color: #e2e8f0;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 42px;
    font-family: inherit;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: #6366f1; }
  #msg-input::placeholder { color: #475569; }
  #send-btn {
    width: 42px; height: 42px;
    background: #6366f1;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #send-btn:hover { background: #4f46e5; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #334155; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }
  #powered {
    text-align: center;
    font-size: 11px;
    color: #475569;
    padding: 6px 0 2px;
  }
  #powered a { color: #6366f1; text-decoration: none; }
</style>
</head>
<body>

<div id="header">
  <div id="agent-avatar">🤖</div>
  <div id="agent-info">
    <div id="agent-name">Загрузка...</div>
    <div id="agent-status">● онлайн</div>
  </div>
</div>

<div id="messages"></div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Напишите сообщение..." rows="1"></textarea>
  <button id="send-btn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<div id="powered">Powered by <a href="#">Targetolog AI</a></div>

<script>
  const agentId = parseInt(location.pathname.split('/').pop());
  let sessionId = localStorage.getItem('session_' + agentId);
  if (!sessionId) {
    sessionId = 'sess_' + Math.random().toString(36).slice(2) + Date.now();
    localStorage.setItem('session_' + agentId, sessionId);
  }

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  let sending = false;

  async function loadAgent() {
    try {
      const r = await fetch(`/api/agents/${agentId}/greeting`);
      if (!r.ok) throw new Error();
      const data = await r.json();
      document.getElementById('agent-name').textContent = data.name;
      document.title = data.name;
      if (messagesEl.children.length === 0) {
        appendMsg('assistant', data.greeting);
      }
      sendBtn.disabled = false;
    } catch {
      document.getElementById('agent-name').textContent = 'ИИ-помощник';
      appendMsg('assistant', 'Здравствуйте! Чем могу помочь?');
      sendBtn.disabled = false;
    }
  }

  function appendMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'assistant' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🤖';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('div');
      d.className = 'typing-dot';
      ind.appendChild(d);
    }
    wrap.appendChild(av);
    wrap.appendChild(ind);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMsg('user', text);
    showTyping();

    try {
      const r = await fetch(`/api/agents/${agentId}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await r.json();
      removeTyping();
      appendMsg('assistant', data.reply || 'Извините, произошла ошибка.');
    } catch {
      removeTyping();
      appendMsg('assistant', 'Ошибка соединения. Попробуйте ещё раз.');
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  loadAgent();
</script>
</body>
</html>
